name: Bug
description: Report reproducible incorrect behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: observed
    attributes:
      label: Observed behavior
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Include minimal steps, relevant logs, and environment details.
    validations:
      required: true
  - type: textarea
    id: security
    attributes:
      label: Security or tenant impact
      description: Do not include credentials or private data.
