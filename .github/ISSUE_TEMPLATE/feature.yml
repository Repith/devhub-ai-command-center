name: Feature
description: Propose a scoped product or platform capability
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or engineering problem should be solved?
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Expected outcome
      description: Describe observable behavior and acceptance criteria.
    validations:
      required: true
  - type: textarea
    id: risks
    attributes:
      label: Security and tenant risks
      description: Note authorization, data isolation, prompt, file, or resource risks.
