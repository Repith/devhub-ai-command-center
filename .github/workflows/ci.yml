name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:18.4-alpine3.23
        env:
          POSTGRES_DB: devhub
          POSTGRES_PASSWORD: devhub
          POSTGRES_USER: devhub
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U devhub -d devhub"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://devhub:devhub@localhost:5432/devhub?schema=public

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Use pinned npm
        run: npm install --global npm@11.16.0

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Apply database migrations
        run: npm run db:migrate --workspace packages/database

      - name: Seed database twice
        run: |
          npm run db:seed --workspace packages/database
          npm run db:seed --workspace packages/database

      - name: Integration test
        run: npm run test:integration

      - name: Build
        run: npm run build
